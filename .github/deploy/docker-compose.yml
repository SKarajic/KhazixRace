services:
  pgsql:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE}:${APP_TAG:-latest}
    restart: unless-stopped
    ports:
      - '127.0.0.1:8000:80'
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    image: ${APP_IMAGE}:${APP_TAG:-latest}
    restart: unless-stopped
    command: ['php', 'artisan', 'queue:work', '--queue=high,default', '--tries=3', '--timeout=90']
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: ${APP_IMAGE}:${APP_TAG:-latest}
    restart: unless-stopped
    command: ['php', 'artisan', 'schedule:work']
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgsql_data:
  redis_data:
  app_storage:
